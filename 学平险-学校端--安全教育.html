<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学平险·学校端 | 安全教育</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter','PingFang SC',sans-serif;background:#f0f2f5;color:#1E2F3E;font-size:14px}
    .app-wrapper{display:flex;min-height:100vh}
    .main-content{flex:1;padding:1.5rem 2rem 2rem;overflow-x:auto}
    .top-bar{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:1rem;flex-wrap:wrap}
    .welcome h2{font-size:1.25rem;font-weight:600;display:flex;align-items:center;gap:10px}
    .welcome p{color:#5e7f92;font-size:.85rem;margin-top:4px}
    .btn{padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer;border:1px solid transparent;font-weight:500;display:inline-flex;align-items:center;gap:6px;text-decoration:none;color:inherit}
    .btn-primary{background:#1C6E5C;color:#fff;border-color:#1C6E5C}
    .btn-outline{background:#fff;border-color:#d9d9d9;color:#4c6a7e}
    .btn-sm{padding:5px 12px;font-size:12px}
    .btn:disabled{opacity:.45;cursor:not-allowed}

    .view{display:none}.view.active{display:block}
    .kpi-row{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:12px}
    @media(max-width:760px){.kpi-row{grid-template-columns:1fr}}
    .kpi{background:#fff;border:1px solid #f0f0f0;border-radius:8px;padding:12px 16px}
    .kpi .label{font-size:12px;color:#88a3b5}
    .kpi .val{font-size:1.5rem;font-weight:600;margin-top:4px;color:#1C6E5C}

    .panel{background:#fff;border:1px solid #f0f0f0;border-radius:8px;overflow:hidden}
    .toolbar{padding:12px 16px;border-bottom:1px solid #f0f0f0;display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:#fff}
    .toolbar select,.toolbar input{padding:6px 11px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;background:#fff}
    .toolbar input[type=search]{flex:1;min-width:160px;max-width:240px}
    .toolbar .spacer{flex:1}

    .batch-bar{display:none;padding:8px 16px;background:#e6f4ff;border-bottom:1px solid #91caff;align-items:center;gap:12px;font-size:13px;flex-wrap:wrap}
    .batch-bar.show{display:flex}
    .batch-bar .count{color:#1C6E5C;font-weight:600}

    table{width:100%;border-collapse:collapse;font-size:13px}
    th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #f0f0f0;vertical-align:middle}
    th{color:#6792a8;font-size:12px;font-weight:600;background:#fafafa;white-space:nowrap}
    th.sortable{cursor:pointer;user-select:none}
    th.sortable:hover{color:#1C6E5C}
    th.sortable .sort-ic{font-size:10px;margin-left:4px;opacity:.45}
    th.sortable.active .sort-ic{opacity:1;color:#1C6E5C}
    tbody tr:hover{background:#fafafa}
    td.num{text-align:right;font-variant-numeric:tabular-nums}
    .title-link{color:#1C6E5C;font-weight:600;cursor:pointer;background:none;border:none;padding:0;font-size:inherit;text-align:left;line-height:1.4}
    .title-link:hover{text-decoration:underline}
    .act-group{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .link-btn{color:#1C6E5C;font-weight:500;cursor:pointer;background:none;border:none;font-size:12px;padding:0;white-space:nowrap}
    .link-btn.warn{color:#c45656}

    .type-tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;display:inline-block}
    .type-tag.publicity{background:#e6f4ff;color:#1677ff;border:1px solid #91caff}
    .type-tag.reminder{background:#fff2e8;color:#fa541c;border:1px solid #ffbb96}
    .pill{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;display:inline-block}
    .pill.pub{background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f}
    .pill.off{background:#fff1f0;color:#f5222d;border:1px solid #ffa39e}
    .pill.draft{background:#fafafa;color:#8c8c8c;border:1px solid #d9d9d9}

    /* Switch（Ant Design 风格） */
    .switch-wrap{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:#88a3b5}
    .switch{position:relative;width:44px;height:22px;border-radius:11px;background:#00000040;cursor:pointer;transition:.2s;border:none;padding:0;flex-shrink:0}
    .switch::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 2px 4px rgba(0,0,0,.2)}
    .switch.on{background:#1C6E5C}
    .switch.on::after{left:24px}
    .switch:disabled{opacity:.4;cursor:not-allowed}

    .empty-state{text-align:center;padding:48px 24px;color:#88a3b5}

    .edit-form-panel{padding:20px 24px 24px}
    .edit-form-title{font-size:16px;font-weight:600;margin-bottom:20px;display:flex;align-items:center;gap:8px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px 20px}
    @media(max-width:900px){.form-grid{grid-template-columns:1fr}}
    .form-grid .span-full{grid-column:1/-1}
    .form-row label{display:block;font-size:12px;color:#88a3b5;font-weight:500;margin-bottom:6px}
    .form-row label .req{color:#c45656}
    .form-row input,.form-row select{width:100%;padding:8px 11px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px;font-family:inherit}
    .cover-only{display:none}.cover-only.show{display:block}
    .upload-box{border:1px dashed #d9d9d9;border-radius:6px;padding:20px;text-align:center;color:#88a3b5;font-size:13px;background:#fafafa;cursor:pointer}
    .rte{border:1px solid #d9d9d9;border-radius:6px;overflow:hidden;background:#fff}
    .rte-toolbar{padding:6px 10px;background:#fafafa;border-bottom:1px solid #f0f0f0;display:flex;gap:4px;flex-wrap:wrap}
    .rte-toolbar button{width:28px;height:28px;border:1px solid transparent;background:transparent;border-radius:4px;cursor:pointer;color:#4c6a7e;font-size:13px}
    .rte-toolbar button:hover{background:#eef6f3;color:#1C6E5C}
    .rte-toolbar .sep{width:1px;height:18px;background:#e8e8e8;margin:0 2px}
    .rte-body{min-height:260px;padding:14px 16px;font-size:14px;line-height:1.75;outline:none}
    .rte-body:empty:before{content:attr(data-placeholder);color:#bfbfbf;pointer-events:none}
    .edit-ft{margin-top:20px;padding-top:16px;border-top:1px solid #f0f0f0;display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:flex-end}

    /* Drawer 详情 */
    .drawer-mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:110}
    .drawer-mask.open{display:block}
    .drawer{position:fixed;top:0;right:0;width:min(480px,100vw);height:100vh;background:#fff;box-shadow:-4px 0 16px rgba(0,0,0,.08);z-index:111;transform:translateX(100%);transition:transform .25s;display:flex;flex-direction:column}
    .drawer-mask.open .drawer{transform:translateX(0)}
    .drawer-hd{padding:16px 20px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
    .drawer-hd h3{font-size:16px;font-weight:600;line-height:1.4;flex:1}
    .drawer-close{border:none;background:none;font-size:20px;color:#88a3b5;cursor:pointer;line-height:1}
    .drawer-bd{padding:16px 20px;overflow-y:auto;flex:1;font-size:14px;line-height:1.7;color:#4c6a7e}
    .drawer-meta{font-size:12px;color:#88a3b5;line-height:1.8;margin-bottom:16px;padding:12px;background:#fafafa;border-radius:6px}
    .drawer-ft{padding:12px 20px;border-top:1px solid #f0f0f0;display:flex;gap:8px;justify-content:flex-end}

    .modal-mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:120;align-items:center;justify-content:center;padding:20px}
    .modal-mask.open{display:flex}
    .modal{background:#fff;border-radius:8px;width:100%;max-width:400px;padding:24px;text-align:center}
    .modal h4{font-size:16px;margin-bottom:8px}
    .modal p{font-size:13px;color:#88a3b5;margin-bottom:20px;line-height:1.6}
    .modal-btns{display:flex;gap:8px;justify-content:center}
  </style>
  <link rel="stylesheet" href="shared-ui.css">
  <link rel="stylesheet" href="proto-notes.css">
  <link rel="stylesheet" href="学平险-学校端-sidebar.css">
  <link rel="stylesheet" href="学平险-学校端-b-end.css">
</head>
<body>
<div class="app-wrapper">
  <div class="sidebar" id="schoolSidebar"></div>
  <main class="main-content">
    <div class="top-bar">
      <div class="page-head">
        <nav class="breadcrumb" id="pageBreadcrumb" aria-label="面包屑">学校端 / 安全教育</nav>
        <div class="page-title-row">
          <button type="button" class="btn-back" id="btnBack" hidden aria-label="返回"><i class="fas fa-arrow-left"></i></button>
          <div class="page-title-main welcome">
            <h2><i class="fas fa-shield-halved" style="color:#1C6E5C"></i> 安全教育</h2>
            <p id="pageDesc" class="page-sub">发布与管理安全宣传、安全提醒</p>
          </div>
        </div>
      </div>
      <div id="userMenuMount"></div>
    </div>

    <div class="page-with-notes">
    <div class="page-main-col">

    <div class="view active" id="viewList">
      <div class="kpi-row">
        <div class="kpi"><div class="label">安全宣传<span class="proto-mark" title="见右侧批注 ①">①</span></div><div class="val" id="kpiPublicity">—</div></div>
        <div class="kpi"><div class="label">安全提醒</div><div class="val" id="kpiReminder">—</div></div>
      </div>
      <div class="panel">
        <div class="toolbar">
          <select id="filterType"><option value="">内容类型</option><option value="PUBLICITY">安全宣传</option><option value="REMINDER">安全提醒</option></select>
          <select id="filterStatus"><option value="">状态</option><option value="PUBLISHED">已发布</option><option value="OFFLINE">已下架</option></select>
          <input type="search" id="filterKw" placeholder="搜索标题">
          <span class="spacer"></span>
          <span class="proto-mark" title="见右侧批注 ②">②</span>
          <button class="btn btn-primary btn-sm" id="btnAdd"><i class="fas fa-plus"></i> 新增</button>
        </div>
        <div class="batch-bar" id="batchBar">
          <span class="proto-mark" title="见右侧批注 ⑨">⑨</span>
          <span>已选 <span class="count" id="batchCount">0</span> 条</span>
          <button class="btn btn-outline btn-sm" id="batchOffline">批量下架</button>
          <button class="btn btn-outline btn-sm" id="batchDelete" style="color:#c45656;border-color:#ffa39e">批量删除</button>
          <button class="btn btn-outline btn-sm" id="batchClear">取消选择</button>
        </div>
        <div style="overflow-x:auto">
          <table>
            <thead>
              <tr>
                <th style="width:36px"><input type="checkbox" id="checkAll" title="全选"></th>
                <th>标题<span class="proto-mark" title="见右侧批注 ③">③</span></th>
                <th>内容类型</th>
                <th class="num sortable" data-sort="pv_count">浏览量<span class="proto-mark" title="见右侧批注 ⑧">⑧</span><i class="fas fa-sort sort-ic"></i></th>
                <th class="sortable" data-sort="publish_time">发布时间<i class="fas fa-sort sort-ic"></i></th>
                <th>状态</th>
                <th>置顶</th>
                <th>上架<span class="proto-mark" title="见右侧批注 ⑩">⑩</span></th>
                <th style="min-width:120px">操作<span class="proto-mark" title="见右侧批注 ④">④</span></th>
              </tr>
            </thead>
            <tbody id="contentTable"></tbody>
          </table>
        </div>
        <div class="pager" id="contentPager" data-b-end-pager data-page-size="10"></div>
      </div>
    </div>

    <div class="view" id="viewEdit">
      <div class="panel edit-form-panel">
        <div class="edit-form-title" id="editTitle"><i class="fas fa-plus"></i> 新增内容<span class="proto-mark" title="见右侧批注 ⑤">⑤</span></div>
        <div class="form-grid">
          <div class="form-row">
            <label>内容类型 <span class="req">*</span></label>
            <select id="fmType"><option value="PUBLICITY">安全宣传</option><option value="REMINDER">安全提醒</option></select>
          </div>
          <div class="form-row">
            <label>标题 <span class="req">*</span></label>
            <input type="text" id="fmTitle" placeholder="请输入标题">
          </div>
          <div class="form-row cover-only span-full" id="coverRow">
            <label>封面图（选填）</label>
            <div class="upload-box"><i class="fas fa-image"></i> 点击上传封面</div>
          </div>
          <div class="form-row span-full">
            <label>正文内容 <span class="req">*</span><span class="proto-mark" title="见右侧批注 ⑥">⑥</span></label>
            <div class="rte">
              <div class="rte-toolbar">
                <button type="button" data-cmd="bold"><i class="fas fa-bold"></i></button>
                <button type="button" data-cmd="italic"><i class="fas fa-italic"></i></button>
                <button type="button" data-cmd="underline"><i class="fas fa-underline"></i></button>
                <span class="sep"></span>
                <button type="button" data-cmd="formatBlock" data-val="h3"><i class="fas fa-heading"></i></button>
                <button type="button" data-cmd="insertUnorderedList"><i class="fas fa-list-ul"></i></button>
                <button type="button" id="btnInsertImg"><i class="fas fa-image"></i></button>
              </div>
              <div class="rte-body" id="rteBody" contenteditable="true" data-placeholder="请输入正文…"></div>
            </div>
          </div>
        </div>
        <div class="edit-ft">
          <button class="btn btn-outline" id="btnCancelEdit">取消</button>
          <button class="btn btn-outline" id="btnSaveEdit" style="display:none"><i class="fas fa-check"></i> 保存<span class="proto-mark" title="见右侧批注 ⑪" style="margin-left:6px">⑪</span></button>
          <button class="btn btn-primary" id="btnPublish"><i class="fas fa-paper-plane"></i> 发布<span class="proto-mark" title="见右侧批注 ⑦" style="margin-left:6px;background:rgba(255,255,255,.35)">⑦</span></button>
        </div>
      </div>
    </div>

    </div>
    <div id="protoNotesMount"></div>
    </div>
  </main>
</div>

<div class="drawer-mask" id="drawerMask">
  <div class="drawer" id="drawerPanel">
    <div class="drawer-hd">
      <h3 id="drawerTitle">—</h3>
      <button type="button" class="drawer-close" id="drawerClose">&times;</button>
    </div>
    <div class="drawer-bd" id="drawerBody"></div>
    <div class="drawer-ft">
      <button class="btn btn-outline" id="drawerCloseBtn">关闭</button>
      <button class="btn btn-primary" id="drawerEditBtn">编辑</button>
    </div>
  </div>
</div>

<div class="modal-mask" id="confirmModal">
  <div class="modal">
    <h4 id="confirmTitle">确认发布？</h4>
    <p id="confirmDesc">发布后将同步上架，本校学生家长即可查看</p>
    <div class="modal-btns">
      <button class="btn btn-outline" id="confirmCancel">取消</button>
      <button class="btn btn-primary" id="confirmOk">确认</button>
    </div>
  </div>
</div>

<script src="学平险-学校端-sidebar.js"></script>
<script src="b-end-pager.js"></script>

<script src="proto-datetime.js"></script>
<script src="学平险-学校端--安全教育.notes.js"></script>
<script>initSchoolSidebar("safetyEdu");</script>
<script>
  mountProtoNotes('protoNotesMount', buildFullProtoNotesSection(window.SAFETY_PROTO_SCHOOL));
</script>
<script>
  var SCHOOL_ID = 'SCH001';
  var STORAGE_KEY = 'school_safety_content_v2';
  var TYPE_LABEL = { PUBLICITY:'安全宣传', REMINDER:'安全提醒' };
  var STATUS_LABEL = { PUBLISHED:'已发布', OFFLINE:'已下架' };

  var DEFAULT = [
    { id:'SC001', school_id:SCHOOL_ID, title:'防溺水知识宣传', content_type:'PUBLICITY',
      content:'<p>溺水是我国青少年意外伤亡的首要原因。请家长做到「四知道」。</p>',
      cover_url:'pool', is_top:true, pv_count:128, status:'PUBLISHED', publish_time:'2026-06-18 09:00:00', update_time:'2026-06-18 09:00:00' },
    { id:'SC002', school_id:SCHOOL_ID, title:'交通安全知识宣传', content_type:'PUBLICITY',
      content:'<p>上下学请走斑马线，遵守交通信号灯。</p>',
      cover_url:'traffic', is_top:false, pv_count:86, status:'PUBLISHED', publish_time:'2026-06-15 14:30:00', update_time:'2026-06-15 14:30:00' },
    { id:'SC004', school_id:SCHOOL_ID, title:'暑期防溺水提醒', content_type:'REMINDER',
      content:'<p><strong>暑期将至，请家长务必履行监护责任。</strong></p>',
      cover_url:'', is_top:true, pv_count:210, status:'PUBLISHED', publish_time:'2026-06-20 08:00:00', update_time:'2026-06-20 08:00:00' },
    { id:'SC008', school_id:SCHOOL_ID, title:'消防演练通知（未发布）', content_type:'REMINDER',
      content:'<p>本周五下午进行全校消防演练，请各班做好准备。</p>',
      cover_url:'', is_top:false, pv_count:0, status:'OFFLINE', publish_time:'2026-06-21 10:00:00', update_time:'2026-06-21 10:00:00' },
    { id:'SC007', school_id:SCHOOL_ID, title:'防诈骗宣传（已下架）', content_type:'PUBLICITY',
      content:'<p>警惕冒充老师、家委的收费诈骗…</p>',
      cover_url:'', is_top:false, pv_count:32, status:'OFFLINE', publish_time:'2026-03-01 11:00:00', update_time:'2026-04-01 14:00:00' }
  ];

  var DT = window.ProtoDateTime;

  var CONTENTS = loadData();
  var editingId = null;
  var drawerId = null;
  var filters = { kw:'', type:'', status:'' };
  var sortField = 'update_time';
  var sortDir = 'desc';
  var selectedIds = new Set();
  var confirmCallback = null;

  function loadData(){
    try {
      var r = localStorage.getItem(STORAGE_KEY);
      if(r){
        return JSON.parse(r).map(function(c){
          if(c.status === 'DRAFT'){
            c.status = 'OFFLINE';
            if(!c.publish_time || c.publish_time === '—') c.publish_time = c.update_time || DT.nowDateTimeFull();
          }
          return c;
        });
      }
    } catch(e){}
    return JSON.parse(JSON.stringify(DEFAULT));
  }
  function saveData(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(CONTENTS)); }

  function pillClass(s){ return s==='PUBLISHED'?'pub':'off'; }

  function showList(){
    document.getElementById('viewList').classList.add('active');
    document.getElementById('viewEdit').classList.remove('active');
    document.getElementById('pageDesc').textContent = '发布与管理安全宣传、安全提醒';
    document.getElementById('pageBreadcrumb').innerHTML = '学校端 / 安全教育';
    document.getElementById('btnBack').hidden = true;
    renderList();
  }

  function showEdit(id){
    editingId = id || null;
    document.getElementById('viewList').classList.remove('active');
    document.getElementById('viewEdit').classList.add('active');
    closeDrawer();
    document.getElementById('btnBack').hidden = false;
    var c = id ? CONTENTS.find(function(x){ return x.id === id; }) : null;
    document.getElementById('pageDesc').textContent = c ? '编辑 · '+c.title : '新增内容';
    document.getElementById('pageBreadcrumb').innerHTML = '学校端 / 安全教育 / <b>'+(c?'编辑内容':'新增内容')+'</b>';
    document.getElementById('editTitle').innerHTML = '<i class="fas fa-'+(c?'pen':'plus')+'"></i> '+(c?'编辑内容':'新增内容')+'<span class="proto-mark" title="见右侧批注 ⑤">⑤</span>';
    document.getElementById('fmType').value = c ? c.content_type : 'PUBLICITY';
    document.getElementById('fmTitle').value = c ? c.title : '';
    document.getElementById('rteBody').innerHTML = c ? c.content : '';
    toggleCover();
    var st = c ? c.status : null;
    document.getElementById('btnSaveEdit').style.display = c ? 'inline-flex' : 'none';
    if (c) {
      document.getElementById('btnSaveEdit').innerHTML = '<i class="fas fa-check"></i> 保存<span class="proto-mark" title="见右侧批注 ⑪" style="margin-left:6px">⑪</span>';
    }
    document.getElementById('btnPublish').innerHTML = '<i class="fas fa-paper-plane"></i> '+(st==='PUBLISHED'||st==='OFFLINE'?'重新发布':'发布')+'<span class="proto-mark" title="见右侧批注 ⑦" style="margin-left:6px;background:rgba(255,255,255,.35)">⑦</span>';
    window.scrollTo(0,0);
  }

  function getRteHtml(){
    var html = document.getElementById('rteBody').innerHTML.trim();
    return document.getElementById('rteBody').innerText.trim() ? html : '';
  }

  function renderKpi(){
    var pub=0, rem=0;
    CONTENTS.forEach(function(c){
      if(c.content_type==='PUBLICITY') pub++; else rem++;
    });
    document.getElementById('kpiPublicity').textContent = pub;
    document.getElementById('kpiReminder').textContent = rem;
  }

  function filtered(){
    var list = CONTENTS.filter(function(c){
      if(filters.kw && c.title.indexOf(filters.kw)<0) return false;
      if(filters.type && c.content_type!==filters.type) return false;
      if(filters.status && c.status!==filters.status) return false;
      return true;
    });
    list.sort(function(a,b){
      var va = a[sortField], vb = b[sortField];
      if(sortField==='pv_count'){ va=va||0; vb=vb||0; return sortDir==='asc'?va-vb:vb-va; }
      va = va||''; vb = vb||'';
      return sortDir==='asc'?String(va).localeCompare(String(vb)):String(vb).localeCompare(String(va));
    });
    return list;
  }

  function updateBatchBar(){
    var n = selectedIds.size;
    document.getElementById('batchBar').classList.toggle('show', n > 0);
    document.getElementById('batchCount').textContent = n;
    document.getElementById('batchOffline').disabled = n === 0;
    document.getElementById('batchDelete').disabled = n === 0;
  }

  function renderList(){
    renderKpi();
    var list = filtered();
    document.querySelectorAll('th.sortable').forEach(function(th){
      th.classList.toggle('active', th.getAttribute('data-sort')===sortField);
      var ic = th.querySelector('.sort-ic');
      if(ic) ic.className = 'fas sort-ic '+(sortField===th.getAttribute('data-sort')?(sortDir==='asc'?'fa-sort-up':'fa-sort-down'):'fa-sort');
    });
    var el = document.getElementById('contentTable');
    if(!list.length){
      el.innerHTML = '<tr><td colspan="9"><div class="empty-state"><p>暂无内容</p><button class="btn btn-primary btn-sm" id="btnEmptyAdd"><i class="fas fa-plus"></i> 新增</button></div></td></tr>';
      document.getElementById('btnEmptyAdd').onclick = function(){ showEdit(); };
      if(window.BEndPager) BEndPager.remount('#contentPager');
      updateBatchBar();
      return;
    }
    el.innerHTML = list.map(function(c){
      var tCls = c.content_type==='REMINDER'?'reminder':'publicity';
      var pubTime = DT.formatDateTimeFull(c.publish_time);
      var topOn = !!c.is_top;
      var shelfOn = c.status==='PUBLISHED';
      var acts = '<button class="link-btn" data-act="edit" data-id="'+c.id+'">编辑</button>';
      acts += '<button class="link-btn warn" data-act="delete" data-id="'+c.id+'">删除</button>';
      var topCell = c.status==='PUBLISHED'
        ? '<button type="button" class="switch'+(topOn?' on':'')+'" data-act="top" data-id="'+c.id+'"></button>'
        : '—';
      var shelfCell = '<button type="button" class="switch'+(shelfOn?' on':'')+'" data-act="shelf" data-id="'+c.id+'"></button>';
      return '<tr data-id="'+c.id+'">'+
        '<td><input type="checkbox" class="row-check" data-id="'+c.id+'"'+(selectedIds.has(c.id)?' checked':'')+'></td>'+
        '<td><button type="button" class="title-link" data-act="detail" data-id="'+c.id+'">'+c.title+'</button></td>'+
        '<td><span class="type-tag '+tCls+'">'+TYPE_LABEL[c.content_type]+'</span></td>'+
        '<td class="num">'+(c.pv_count||0).toLocaleString()+'</td>'+
        '<td>'+pubTime+'</td>'+
        '<td><span class="pill '+pillClass(c.status)+'">'+STATUS_LABEL[c.status]+'</span></td>'+
        '<td>'+topCell+'</td>'+
        '<td>'+shelfCell+'</td>'+
        '<td><div class="act-group">'+acts+'</div></td></tr>';
    }).join('');
    if(window.BEndPager) BEndPager.remount('#contentPager');
    document.getElementById('checkAll').checked = list.length && list.every(function(c){ return selectedIds.has(c.id); });
    updateBatchBar();
  }

  function openDrawer(id){
    var c = CONTENTS.find(function(x){ return x.id===id; });
    if(!c) return;
    drawerId = id;
    document.getElementById('drawerTitle').textContent = c.title;
    document.getElementById('drawerBody').innerHTML =
      '<div class="drawer-meta">类型：'+TYPE_LABEL[c.content_type]+' · 状态：'+STATUS_LABEL[c.status]+
      '<br>发布时间：'+DT.formatDateTimeFull(c.publish_time)+' · 浏览量：'+(c.pv_count||0)+'</div>'+
      '<div class="detail-content">'+c.content+'</div>';
    document.getElementById('drawerMask').classList.add('open');
  }
  function closeDrawer(){
    drawerId = null;
    document.getElementById('drawerMask').classList.remove('open');
  }

  function openConfirm(title, desc, onOk){
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmDesc').textContent = desc;
    confirmCallback = onOk;
    document.getElementById('confirmModal').classList.add('open');
  }

  function collectForm(requireContent){
    var title = document.getElementById('fmTitle').value.trim();
    var content = getRteHtml();
    if(!title){ alert('请填写标题'); return null; }
    if(requireContent && !content){ alert('请填写正文'); return null; }
    return { title:title, content:content||'<p></p>', content_type:document.getElementById('fmType').value, is_top:false };
  }

  function mergeFormData(item, data){
    item.title = data.title;
    item.content = data.content;
    item.content_type = data.content_type;
    item.cover_url = data.content_type === 'PUBLICITY' ? (item.cover_url || '') : '';
    item.update_time = DT.nowDateTimeFull();
  }

  function createPublishedItem(data){
    var item = {
      id:'SC'+Date.now().toString().slice(-6),
      school_id:SCHOOL_ID,
      title:data.title,
      content_type:data.content_type,
      content:data.content,
      cover_url:data.content_type==='PUBLICITY'?'':'',
      is_top:false,
      pv_count:0,
      status:'PUBLISHED',
      publish_time:DT.nowDateTimeFull(),
      update_time:DT.nowDateTimeFull()
    };
    return item;
  }

  /** 发布同步上架：status=PUBLISHED 即列表上架 Switch 为开 */
  function publishItem(item){
    var now = DT.nowDateTimeFull();
    item.status = 'PUBLISHED';
    item.publish_time = now;
    item.update_time = now;
  }

  /** 下架同步关闭上架 Switch */
  function offlineItem(item){
    item.status = 'OFFLINE';
    item.update_time = DT.nowDateTimeFull();
  }

  function confirmPublish(items, onOk){
    var republish = items.length === 1 && items[0] && items[0].id;
    openConfirm(
      republish ? '确认重新发布？' : '确认发布？',
      republish
        ? '重新发布后将更新发布时间并同步上架，家长端可查看最新内容（浏览量保留）'
        : '发布后将同步上架，本校学生家长即可查看；若暂不想展示请关闭上架 Switch 或删除',
      onOk
    );
  }

  function publishWithForm(data){
    var item;
    if(editingId){
      item = CONTENTS.find(function(c){ return c.id===editingId; });
      mergeFormData(item, data);
    } else {
      item = createPublishedItem(data);
      CONTENTS.unshift(item);
      saveData();
      return item;
    }
    publishItem(item);
    saveData();
    return item;
  }

  document.getElementById('contentTable').addEventListener('click', function(e){
    var sw = e.target.closest('button.switch[data-act]');
    if(sw && !sw.disabled){
      var id = sw.getAttribute('data-id'), act = sw.getAttribute('data-act');
      var item = CONTENTS.find(function(c){ return c.id===id; });
      if(!item) return;
      if(act==='top' && item.status==='PUBLISHED'){ item.is_top = !item.is_top; item.update_time = DT.nowDateTimeFull(); saveData(); renderList(); }
      if(act==='shelf'){
        if(item.status === 'PUBLISHED') offlineItem(item);
        else publishItem(item);
        saveData();
        renderList();
      }
      return;
    }
    var btn = e.target.closest('[data-act]');
    if(!btn) return;
    var id = btn.getAttribute('data-id'), act = btn.getAttribute('data-act');
    if(act==='detail') openDrawer(id);
    else if(act==='edit') showEdit(id);
    else if(act==='delete') deleteItem(id);
  });

  document.getElementById('contentTable').addEventListener('change', function(e){
    if(e.target.classList.contains('row-check')){
      var id = e.target.getAttribute('data-id');
      if(e.target.checked) selectedIds.add(id); else selectedIds.delete(id);
      updateBatchBar();
    }
  });

  document.getElementById('checkAll').onchange = function(){
    filtered().forEach(function(c){
      if(this.checked) selectedIds.add(c.id); else selectedIds.delete(c.id);
    }, this);
    renderList();
  };

  document.querySelector('thead').addEventListener('click', function(e){
    var th = e.target.closest('th.sortable');
    if(!th) return;
    var f = th.getAttribute('data-sort');
    if(sortField===f) sortDir = sortDir==='asc'?'desc':'asc';
    else { sortField = f; sortDir = 'desc'; }
    renderList();
  });

  function deleteItem(id){
    var item = CONTENTS.find(function(c){ return c.id===id; });
    if(!item||!confirm('确认删除「'+item.title+'」？删除后不可恢复。')) return;
    CONTENTS = CONTENTS.filter(function(c){ return c.id!==id; });
    selectedIds.delete(id); saveData(); renderList();
  }

  document.getElementById('batchOffline').onclick = function(){
    var ids = Array.from(selectedIds).filter(function(id){ var c=CONTENTS.find(function(x){return x.id===id;}); return c&&c.status==='PUBLISHED'; });
    if(!ids.length){ alert('所选内容中没有已发布项'); return; }
    if(!confirm('确认批量下架 '+ids.length+' 条？')) return;
    ids.forEach(function(id){ offlineItem(CONTENTS.find(function(x){return x.id===id;})); });
    saveData(); selectedIds.clear(); renderList();
  };
  document.getElementById('batchDelete').onclick = function(){
    var ids = Array.from(selectedIds);
    if(!ids.length||!confirm('确认批量删除 '+ids.length+' 条？不可恢复。')) return;
    CONTENTS = CONTENTS.filter(function(c){ return ids.indexOf(c.id)<0; });
    selectedIds.clear(); saveData(); renderList();
  };
  document.getElementById('batchClear').onclick = function(){ selectedIds.clear(); renderList(); };

  document.querySelector('.rte-toolbar').addEventListener('click', function(e){
    var btn = e.target.closest('button[data-cmd]');
    if(!btn) return;
    e.preventDefault();
    document.getElementById('rteBody').focus();
    var cmd = btn.getAttribute('data-cmd'), val = btn.getAttribute('data-val');
    if(cmd==='formatBlock') document.execCommand(cmd,false,val);
    else document.execCommand(cmd,false,null);
  });
  document.getElementById('btnInsertImg').onclick = function(){
    document.getElementById('rteBody').focus();
    document.execCommand('insertHTML',false,'<div style="background:#f5f5f5;padding:16px;text-align:center;color:#999;margin:8px 0"><i class="fas fa-image"></i> 配图</div>');
  };
  function toggleCover(){ document.getElementById('coverRow').classList.toggle('show', document.getElementById('fmType').value==='PUBLICITY'); }
  document.getElementById('fmType').onchange = toggleCover;

  document.getElementById('btnSaveEdit').onclick = function(){
    var data = collectForm(true);
    if(!data) return;
    var item = CONTENTS.find(function(c){ return c.id===editingId; });
    mergeFormData(item, data);
    saveData();
    alert('已保存（未更新发布时间；若需同步上架请点重新发布，或在列表打开上架 Switch）');
    showList();
  };
  document.getElementById('btnPublish').onclick = function(){
    var data = collectForm(true);
    if(!data) return;
    var existing = editingId ? CONTENTS.find(function(c){ return c.id===editingId; }) : null;
    var isNew = !existing;
    confirmPublish(existing ? [existing] : [], function(){
      publishWithForm(data);
      alert(isNew ? '发布成功，已同步上架' : '已重新发布并同步上架');
      showList();
    });
  };
  document.getElementById('confirmCancel').onclick = function(){ document.getElementById('confirmModal').classList.remove('open'); confirmCallback=null; };
  document.getElementById('confirmOk').onclick = function(){
    document.getElementById('confirmModal').classList.remove('open');
    if(confirmCallback) confirmCallback();
    confirmCallback = null;
  };

  document.getElementById('drawerClose').onclick = closeDrawer;
  document.getElementById('drawerCloseBtn').onclick = closeDrawer;
  document.getElementById('drawerMask').onclick = function(e){ if(e.target===this) closeDrawer(); };
  document.getElementById('drawerEditBtn').onclick = function(){ if(drawerId){ closeDrawer(); showEdit(drawerId); } };

  document.getElementById('btnAdd').onclick = function(){ showEdit(); };
  document.getElementById('btnBack').onclick = showList;
  document.getElementById('btnCancelEdit').onclick = showList;
  document.getElementById('filterKw').oninput = function(e){ filters.kw=e.target.value.trim(); renderList(); };
  document.getElementById('filterType').onchange = function(e){ filters.type=e.target.value; renderList(); };
  document.getElementById('filterStatus').onchange = function(e){ filters.status=e.target.value; renderList(); };

  initSchoolUserMenu('#userMenuMount', showList);
  showList();
</script>
</body>
</html>
