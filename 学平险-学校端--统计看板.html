<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学平险·学校端 | 统计看板</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter','PingFang SC',sans-serif;background:#f3f6fc;color:#1E2F3E;font-size:14px}
    .app-wrapper{display:flex;min-height:100vh}
    .main-content{flex:1;padding:1.5rem 2rem 2rem;overflow-x:auto}
    .top-bar{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:1.2rem;flex-wrap:wrap}
    .welcome h2{font-size:1.5rem;font-weight:600;display:flex;align-items:center;gap:10px}
    .welcome p{color:#5e7f92;font-size:.85rem;margin-top:6px}

    /* KPI 卡片 */
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:1.2rem}
    .kpi-card{background:#fff;border-radius:18px;border:1px solid #eef2f8;padding:16px 18px;display:flex;flex-direction:column;gap:8px;box-shadow:0 4px 10px rgba(0,0,0,.02)}
    .kpi-card .kpi-head{display:flex;justify-content:space-between;align-items:center;color:#88a3b5;font-size:13px}
    .kpi-card .kpi-head i{color:#1C6E5C;font-size:1.05rem}
    .kpi-card .kpi-val{font-size:1.85rem;font-weight:700;color:#1E2F3E;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
    .kpi-card .kpi-val small{font-size:13px;color:#88a3b5;font-weight:500}
    .kpi-card.success .kpi-val{color:#1C6E5C}
    .kpi-card.success.overflow .kpi-val{color:#b88230}
    .kpi-card.danger .kpi-val{color:#c45656}
    .kpi-card .kpi-sub{font-size:12px;color:#5e7f92}

    /* 通用面板 */
    .panel{background:#fff;border-radius:18px;border:1px solid #eef2f8;box-shadow:0 4px 10px rgba(0,0,0,.02);overflow:hidden;margin-bottom:1.2rem}
    .panel-head{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid #eef2f8}
    .panel-head h3{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
    .panel-head h3 i{color:#1C6E5C}
    .panel-head .note{font-size:12px;color:#88a3b5}
    .panel-bd{padding:8px 18px 18px}

    /* 风险事件迷你列表 */
    .event-list{display:flex;flex-direction:column;gap:10px}
    .event-item{display:flex;gap:12px;padding:10px;border-radius:10px;background:#fafbfc;border:1px solid #eef2f8;font-size:13px}
    .event-item .ev-dot{width:8px;height:8px;border-radius:50%;background:#1C6E5C;margin-top:6px;flex-shrink:0}
    .event-item.warn .ev-dot{background:#e6b422}
    .event-item.high .ev-dot{background:#c45656}
    .event-item .ev-body{flex:1;min-width:0}
    .event-item .ev-time{color:#88a3b5;font-size:12px;margin-bottom:2px}
    .event-item .ev-title{font-weight:600;color:#1E2F3E}
    .event-item .ev-meta{color:#5e7f92;font-size:12px;margin-top:2px}
    .lv-tag{display:inline-block;margin-left:6px;padding:1px 8px;border-radius:999px;font-size:11px;font-weight:600;border:1px solid #e2e8f0;vertical-align:1px}
    .lv-tag.light{background:#eef6f3;color:#1C6E5C;border-color:#b8d9ce}
    .lv-tag.warn{background:#fff7e6;color:#b88230;border-color:#f5dab1}
    .lv-tag.high{background:#fef0f0;color:#c45656;border-color:#fbc4c4}

    /* 快捷入口 */
    .quick-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
    .quick-card{background:#fff;border-radius:14px;border:1px solid #eef2f8;padding:16px;display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit;transition:border-color .15s, transform .15s}
    .quick-card:hover{border-color:#1C6E5C;transform:translateY(-1px)}
    .quick-card .qc-icon{width:42px;height:42px;border-radius:12px;background:#eef6f3;color:#1C6E5C;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .quick-card .qc-body{flex:1;min-width:0}
    .quick-card .qc-title{font-weight:600;font-size:14px;color:#1E2F3E;display:flex;align-items:center;gap:6px}
    .quick-card .qc-sub{font-size:12px;color:#88a3b5;margin-top:2px}
    .quick-card .qc-arrow{color:#88a3b5;font-size:12px}
    .quick-card:hover .qc-arrow{color:#1C6E5C}

    /* 统计学期（与班级投保名单保持同款 UI） */
    .term-scope-bar{display:flex;align-items:center;gap:12px;margin-bottom:1.2rem;padding:12px 16px;background:#fff;border:1px solid #eef2f8;border-radius:14px;box-shadow:0 4px 10px rgba(0,0,0,.02);flex-wrap:wrap}
    .term-scope-bar label{font-size:13px;font-weight:600;color:#1E2F3E;display:flex;align-items:center;gap:6px;white-space:nowrap}
    .term-scope-bar label i{color:#1C6E5C}
    .term-scope-bar select{padding:8px 14px;border:1px solid #cbdde6;border-radius:10px;font-size:13px;font-weight:500;min-width:300px;max-width:100%;background:#fafbfc;color:#1E2F3E}
    .term-scope-bar select:focus{border-color:#1C6E5C;outline:none;box-shadow:0 0 0 3px rgba(28,110,92,.12)}
    .term-scope-bar .meta{font-size:12px;color:#5e7f92;line-height:1.5;flex:1;min-width:220px}
  </style>
  <link rel="stylesheet" href="shared-ui.css">
  <link rel="stylesheet" href="proto-notes.css">
  <link rel="stylesheet" href="学平险-学校端-sidebar.css">
  <link rel="stylesheet" href="学平险-学校端-b-end.css">
</head>
<body>
<div class="app-wrapper">
  <div class="sidebar" id="schoolSidebar"></div>
  <main class="main-content">

    <div class="top-bar">
      <div class="welcome">
        <h2><i class="fas fa-chart-pie" style="color:#1C6E5C"></i> 统计看板<span class="proto-mark" title="见右侧批注 ⑥">⑥</span></h2>
        <p>立德中学 · <span id="topTerm">2026 春季</span> · <span id="syncHint">数据 15 分钟同步一次</span><span class="proto-mark" title="见右侧批注 ⑦">⑦</span></p>
      </div>
      <div id="userMenuMount"></div>
    </div>

    <div class="page-with-notes">
    <div class="page-main-col">

    <!-- 统计学期：本学期已投保按此口径汇总 -->
    <div class="term-scope-bar" id="termScopeBar">
      <label for="termSel"><i class="fas fa-calendar-days"></i> 统计学期<span class="proto-mark" title="见右侧批注 ①">①</span></label>
      <select id="termSel" title="统计学期"></select>
    </div>

    <!-- 2 张 KPI：学生总数 / 本学期已投保 -->
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-head"><span>学生总数<span class="proto-mark" title="见右侧批注 ②">②</span></span><i class="fas fa-user-graduate"></i></div>
        <div class="kpi-val" id="kpiStudents">— <small>人</small></div>
        <div class="kpi-sub">学生建档</div>
      </div>
      <div class="kpi-card success" id="kpiInsuredCard">
        <div class="kpi-head"><span id="kpiInsuredLabel">本学期已投保<span class="proto-mark" title="见右侧批注 ③">③</span></span><i class="fas fa-user-check"></i></div>
        <div class="kpi-val" id="kpiInsured">— <small>人</small></div>
        <div class="kpi-sub" id="kpiInsuredSub">—</div>
      </div>
    </div>

    <!-- 近期风险事件 -->
    <div class="panel">
      <div class="panel-head">
        <h3><i class="fas fa-triangle-exclamation"></i> 近期风险事件<span class="proto-mark" title="见右侧批注 ④">④</span></h3>
        <a href="学平险-学校端--风险事件登记.html" class="note" style="color:#1C6E5C;text-decoration:none">登记 / 查看 →</a>
      </div>
      <div class="panel-bd">
        <div class="event-list" id="eventList"></div>
      </div>
    </div>

    <!-- 快捷入口 -->
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;font-size:13px;font-weight:600;color:#1E2F3E">
      <i class="fas fa-bolt" style="color:#1C6E5C"></i> 快捷入口<span class="proto-mark" title="见右侧批注 ⑤">⑤</span>
    </div>
    <div class="quick-row">
      <a href="学平险-学校端--学生档案.html" class="quick-card">
        <div class="qc-icon"><i class="fas fa-address-card"></i></div>
        <div class="qc-body">
          <div class="qc-title">学生档案</div>
          <div class="qc-sub">基础信息 · 监护人 · 健康标签</div>
        </div>
        <div class="qc-arrow"><i class="fas fa-arrow-right"></i></div>
      </a>
      <a href="学平险-学校端--班级投保名单.html" class="quick-card">
        <div class="qc-icon"><i class="fas fa-list-check"></i></div>
        <div class="qc-body">
          <div class="qc-title">班级投保名单</div>
          <div class="qc-sub">查看已投保 / 未投保 · 通知家长</div>
        </div>
        <div class="qc-arrow"><i class="fas fa-arrow-right"></i></div>
      </a>
      <a href="学平险-学校端--投保二维码.html" class="quick-card">
        <div class="qc-icon"><i class="fas fa-qrcode"></i></div>
        <div class="qc-body">
          <div class="qc-title">投保二维码</div>
          <div class="qc-sub">下载 / 打印 · 海报分发</div>
        </div>
        <div class="qc-arrow"><i class="fas fa-arrow-right"></i></div>
      </a>
      <a href="学平险-学校端--风险事件登记.html" class="quick-card">
        <div class="qc-icon"><i class="fas fa-triangle-exclamation"></i></div>
        <div class="qc-body">
          <div class="qc-title">风险事件登记</div>
          <div class="qc-sub">磕碰 · 运动伤 · 意外</div>
        </div>
        <div class="qc-arrow"><i class="fas fa-arrow-right"></i></div>
      </a>
    </div>

    </div><!-- /.page-main-col -->

    <div id="protoNotesMount"></div>

    </div><!-- /.page-with-notes -->

  </main>
</div>

<script src="学平险-学校端-school-stats.js"></script>
<script src="proto-datetime.js"></script>
<script src="学平险-学校端-sidebar.js"></script>
<script>initSchoolSidebar("dashboard");</script>
<script>initSchoolUserMenu('#userMenuMount');</script>
<script>
  /* #原型说明：与班级投保名单共用 SchoolStats，按统计学期汇总「本学期已投保」 */
  var fmt = SchoolStats.fmt;

  /** 按学期汇总：去重学生数 + 档案关联（见 SchoolStats.summarizeTermEnrollment） */
  function getEnrolledForTerm(termCode){
    return SchoolStats.summarizeTermEnrollment(termCode);
  }

  function renderKpis(){
    var totals = SchoolStats.schoolTotals();
    var def = SchoolStats.getStatTerm();
    var termCode = SchoolStats.getStatTermCode();
    var enrolled = getEnrolledForTerm(termCode);
    var totalStudents = totals.students;
    var insured = enrolled.insuredStudents;
    var kpiCard = document.getElementById('kpiInsuredCard');
    var ratePart;
    var subParts = ['保障期 ' + def.coverageText];

    if (!totalStudents) {
      ratePart = '—';
    } else if (insured > totalStudents) {
      var overBy = insured - totalStudents;
      ratePart = '超建档 ' + overBy + ' 人';
      kpiCard.classList.add('overflow');
    } else {
      ratePart = (insured / totalStudents * 100).toFixed(1) + '%';
      kpiCard.classList.remove('overflow');
    }

    document.getElementById('topTerm').textContent = def.label;
    document.getElementById('kpiInsuredLabel').textContent = def.label + ' 已投保';
    document.getElementById('kpiStudents').innerHTML = fmt(totalStudents) + ' <small>人</small>';
    document.getElementById('kpiInsured').innerHTML = fmt(insured) + ' <small>人 · ' + ratePart + '</small>';
    document.getElementById('kpiInsuredSub').textContent = subParts.join(' · ');
  }

  function fillTermSelect(){
    var sel = document.getElementById('termSel');
    if(!sel) return;
    sel.innerHTML = SchoolStats.TERM_SELECT_OPTIONS.map(function(code){
      var d = SchoolStats.SCHOOL_TERM_DEFS[code];
      return '<option value="'+code+'">'+d.label+' · '+d.coverageText+'</option>';
    }).join('');
    sel.value = SchoolStats.getStatTermCode();
  }

  SchoolStats.initFromUrl();
  fillTermSelect();
  renderKpis();

  document.getElementById('termSel').addEventListener('change', function(e){
    SchoolStats.setStatTermOverride(e.target.value || null);
    fillTermSelect();
    renderKpis();
  });

  document.getElementById('eventList').innerHTML = SchoolStats.RECENT_RISK_EVENTS.map(function(e){
    return '<a class="event-item '+e.lv+'" href="学平险-学校端--风险事件登记.html" style="text-decoration:none;color:inherit">'+
      '<div class="ev-dot"></div>'+
      '<div class="ev-body">'+
        '<div class="ev-time">'+ProtoDateTime.formatDateTimeFull(e.time)+'</div>'+
        '<div class="ev-title">'+e.title+' <span class="lv-tag '+e.lv+'">'+e.label+'</span></div>'+
        '<div class="ev-meta">'+e.meta+'</div>'+
      '</div>'+
    '</a>';
  }).join('');
</script>
<script src="proto-notes.js"></script>
<script src="学平险-学校端--统计看板.notes.js"></script>
<script>
  mountProtoNotes('protoNotesMount', buildFullProtoNotesSection(window.SCHOOL_DASHBOARD_PROTO));
</script>
</body>
</html>
